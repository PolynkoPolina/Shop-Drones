<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restore password</title>
    <link rel="stylesheet" href="{{ url_for('user.static', filename= 'css/auth-registr.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename= 'css/base.css') }}">
</head>
<body>
    <div class="modal-header">
        <h2>Відновлення пароля</h2>
        <button id= "close-auth-registr" onclick="closeAuthRegistr()"></button>
    </div>  
    <div class="modal-body"> 
        {% if step == 1 %}
            <form method="post">
                <div class="inputs-container">
                    <div class="email">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" placeholder="Введіть email" required>
                    </div>
                </div>
        
                <div class="buttons-container">
                    <button type="button"  class="cancel-button-rest-pass"><a href="/authorization" onclick="closeAuthRegistr()">Скасувати</a></button>
                    <button type="submit" class="send-button"><p>Надіслати лист</p></button>
                </div>
            </form>
        {% else %}
            {% if step == 2 %}
            <div class="modal-overlay">
                <div class="modal-content">
                    <h3>Новий пароль</h3>
                    <form action="" method="POST"> <label>Пароль</label>
                        <input type="password" name="password" required>
                        
                        <label>Підтвердження паролю</label>
                        <input type="password" name="confirm_password" required>
                        
                        <div class="buttons">
                            <button type="button" class="btn-secondary">СКАСУВАТИ</button>
                            <button type="submit" class="btn-primary">ЗБЕРЕГТИ НОВИЙ ПАРОЛЬ</button>
                        </div>
                    </form>
                </div>
            </div>
            {% else %}
            
            {% endif %}

        {% endif %}
    </div>
</body>
<script src="{{ url_for('user.static', filename= 'js/auth-registr.js') }}"></script>
</html>
