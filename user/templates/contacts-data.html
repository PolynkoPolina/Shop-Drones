{% extends 'base.html' %} 

{% block title %}
    Contacts
{% endblock %}

{% block links %}
    <link rel="stylesheet" href="{{ url_for('user.static', filename='css/account.css' ) }}">
{% endblock %}


{% block content %}
<div class="contacts">
        <div class="contacts-info">
            <h2>ОСОБИСТИЙ КАБІНЕТ</h2>

            <a href="/account?page= contacts-data">Контактні дані</a>  

            <a href="/account?page= my-orders">Мої замовлення</a>

            <a href="/account?page= delivery-address">Адреса доставки</a>
           
            <hr>
            
            <p>Вийти</p>
        </div>
        <div class="contacts-form">
            <h2>Контактні дані</h2>

            <form>
                <p>Прізвище</p>
                <input placeholder="Ваше Прізвище">

                <p>Ім'я</p>
                <input type="text" placeholder="Ваше Ім'я">

                <p>По батькові</p>
                <input type="text" placeholder="По батькові">

                <p>День народженння</p>
                <input type = "number" placeholder="DD/MM/YYYY">

                <p>Телефон</p>
                <input type="tel" placeholder="+38 0">

                <p>E-mail</p>
                <input type="email" placeholder="Ваш E-mail">

                <button type="submit">НАДІСЛАТИ</button>
            </form>
        </div>

</div>
{% endblock %}
