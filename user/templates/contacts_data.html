{% extends 'base.html' %} 

{% block title %}
    Contacts data
{% endblock %}

{% block links %}
    <link rel="stylesheet" href="{{ url_for('user.static', filename='css/account.css' )  }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/contacts-data.css' )  }}">
{% endblock %}


{% block content %}
<div class="content">
        <div class="account">
            <h2>ОСОБИСТИЙ КАБІНЕТ</h2>

            <a href="/account?page=contacts_data" class="chosen">Контактні дані</a>  

            <a href="/account?page=my_orders">Мої замовлення</a>

            <a href="/account?page=delivery_address">Адреса доставки</a>
           
            <hr>
            
            <a href="/logout" class="logout">Вийти</a>
        </div>
        <div class="contacts-form">
            <h2>Контактні дані</h2>

            <form class="inputs">
                <p>Прізвище</p>
                <input placeholder="Ваше Прізвище">

                <p>Ім'я</p>
                <input type="text" placeholder="Ваше Ім'я">

                <p>По батькові</p>
                <input type="text" placeholder="По батькові">

                <p>День народженння</p>
                <input type="date" placeholder="DD/MM/YYYY">

                <p>Телефон</p>
                <input type="tel" placeholder="+38 0">

                <p>E-mail</p>
                <input type="email" placeholder="Ваш E-mail">

                <button type="submit">НАДІСЛАТИ</button>
            </form>
        </div>

</div>
{% endblock %}
